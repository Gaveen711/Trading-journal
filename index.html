  </script>

  <!-- ── Primary SEO ────────────────────────────────────────────── -->

  <!-- ── Security ──────────────────────────────────────────────── -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://*.google.com https://*.googleapis.com https://*.firebaseapp.com; script-src 'self' https://*.google.com https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src 'self' data: https://fonts.gstatic.com https://*.fontshare.com; img-src 'self' data: https://*.googleusercontent.com https://*.stripe.com https://*.google.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.google.com https://www.goldapi.io https://*.firebaseapp.com https://api.stripe.com https://q.stripe.com; frame-src 'self' https://*.firebaseapp.com https://*.google.com https://js.stripe.com https://hooks.stripe.com;" />
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />

  <!-- ── Fonts ─────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,350,400,500,700,900&display=swap" rel="stylesheet" />

  <!-- ── Favicon ───────────────────────────────────────────────── -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="theme-color" content="#060606" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // SECURITY SHIELD: Maximum protection against inspection
    (function() {
      // 1. Disable Right Click
      document.addEventListener('contextmenu', e => e.preventDefault());

      // 2. Disable Keyboard Shortcuts (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S)
      document.addEventListener('keydown', e => {
        if (
          e.keyCode === 123 || // F12
          (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
          (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) // Ctrl+U or Ctrl+S
        ) {
          e.preventDefault();
          return false;
        }
      });

      // 3. Clear console on load and continuously
      if (typeof console !== "undefined") {
        console.clear();
        const clear = () => console.clear();
        setInterval(clear, 2000);
      }
      
      // 4. Debugger trap to stall inspection attempts
      setInterval(function() {
        (function() { return false; })["constructor"]("debugger")["call"]();
      }, 1000);
    })();
  </script>
</body>

</html>

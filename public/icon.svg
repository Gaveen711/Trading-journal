<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#10b981" fill-gradient="linear(135deg, #059669 0%, #10b981 100%)"/>
  
  <!-- Dollar coin circle -->
  <circle cx="256" cy="140" r="80" fill="gold" stroke="#ffd700" stroke-width="8" filter="drop-shadow(0 4px 8px rgba(255,215,0,0.3))"/>
  <text x="256" y="155" text-anchor="middle" font-size="64" font-weight="bold" fill="#333" font-family="Arial">$</text>
  
  <!-- Candlestick chart -->
  <g stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wicks -->
    <line x1="128" y1="240" x2="128" y2="200"/>
    <rect x="120" y="200" width="16" height="40" rx="2" fill="#059669"/>
    <line x1="128" y1="160" x2="128" y2="240"/>
    
    <line x1="192" y1="280" x2="192" y2="240"/>
    <rect x="184" y="240" width="16" height="80" rx="2" fill="#ef4444"/>
    <line x1="192" y1="320" x2="192" y2="280"/>
    
    <line x1="256" y1="220" x2="256" y2="180"/>
    <rect x="248" y="180" width="16" height="60" rx="2" fill="#059669"/>
    <line x1="256" y1="140" x2="256" y2="220"/>
    
    <line x1="320" y1="260" x2="320" y2="220"/>
    <rect x="312" y="220" width="16" height="40" rx="2" fill="#ef4444"/>
    <line x1="320" y1="300" x2="320" y2="260"/>
    
    <line x1="384" y1="200" x2="384" y2="160"/>
    <rect x="376" y="160" width="16" height="80" rx="2" fill="#059669"/>
    <line x1="384" y1="120" x2="384" y2="200"/>
  </g>
  
  <!-- Rising arrow -->
  <path d="M160 380 L256 300 L352 380 L320 380 L256 320 L192 380 Z" fill="#fff" stroke="#10b981" stroke-width="6" stroke-linejoin="round"/>
  <path d="M256 320 L256 400" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#34d399" stroke-width="20" opacity="0.4" filter="blur(20px)"/>
</svg>
